<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صبح بخیر - Good Morning Wishes 🌅</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
            background: linear-gradient(135deg, #1d2671 0%, #c33764 50%, #ff7e5f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            color: #ffffff;
            padding: 20px 10px;
        }

        #flower-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .card-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 30px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4),
                        inset 0 0 20px rgba(255, 215, 0, 0.2);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .islamic-symbol {
            font-size: 45px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            margin-bottom: 10px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px #ffd700); }
            100% { transform: scale(1.1); filter: drop-shadow(0 0 20px #ffd700); }
        }

        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 26px;
            color: #ffeaa7;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.5);
        }

        .greeting-badge {
            background: linear-gradient(45deg, #ffd700, #ffa500);
            color: #1a1a2e;
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
            border: 2px solid #ffffff;
        }

        .wish-box {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 20px 15px;
            margin-bottom: 25px;
            border-right: 4px solid #ffd700;
            border-left: 4px solid #ffd700;
        }

        .wish-text {
            font-size: 18px;
            line-height: 2.2;
            color: #f8f9fa;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }

        .blessing-btn {
            background: linear-gradient(135deg, #ff007f, #7928ca);
            color: #ffffff;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-family: 'Noto Nastaliq Urdu', serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 0, 127, 0.5);
            transition: all 0.3s ease;
            outline: none;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .blessing-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 0, 127, 0.8);
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, #ffd700, transparent);
        }

        .divider-icon {
            padding: 0 10px;
            color: #ffd700;
            font-size: 16px;
        }

        .dua-highlight {
            font-size: 16px;
            color: #ffeaa7;
            margin-top: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="flower-canvas"></canvas>

    <div class="card-container">
        <div class="islamic-symbol">🕌 🌙</div>
        
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        
        <div class="divider">
            <span class="divider-icon">✨ 🌸 ✨</span>
        </div>

        <div class="greeting-badge">
            🌅 صبح بخیر - Good Morning! 🌅
        </div>

        <div class="wish-box">
            <p class="wish-text" id="wishText">
                اللہ تعالیٰ آپ کی اس صبح کو برکتوں، خوشیوں اور سلامتی سے بھر دے۔ آپ کا دن ایمان، صحت اور کامیابی سے معطر رہے۔
            </p>
            <span class="dua-highlight" id="duaText">
                "یا اللہ! ہمارے رزق میں برکت اور دلوں میں سکون عطا فرما۔ آمین"
            </span>
        </div>

        <button class="blessing-btn" onclick="nextWish()">
            💖 مزید دعائیں حاصل کریں 🌸
        </button>
    </div>

    <script>
        const canvas = document.getElementById('flower-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const flowers = [];
        const flowerIcons = ['🌸', '🌺', '🌹', '🌻', '🌷', '🌼', '✨'];

        class Flower {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 20 + 15;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = Math.sin(Math.random() * Math.PI) * 1.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 2;
                this.icon = flowerIcons[Math.floor(Math.random() * flowerIcons.length)];
                this.opacity = Math.random() * 0.7 + 0.3;
            }

            update() {
                this.y += this.speedY;
                this.x += Math.sin(this.y / 30) * 1;
                this.rotation += this.rotationSpeed;

                if (this.y > canvas.height + 20) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.icon, 0, 0);
                ctx.restore();
            }
        }

        for (let i = 0; i < 40; i++) {
            const f = new Flower();
            f.y = Math.random() * canvas.height;
            flowers.push(f);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flowers.forEach(flower => {
                flower.update();
                flower.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        const wishes = [
            {
                wish: "اللہ تعالیٰ آپ کی اس صبح کو برکتوں، خوشیوں اور سلامتی سے بھر دے۔ آپ کا دن ایمان، صحت اور کامیابی سے معطر رہے۔",
                dua: '"یا اللہ! ہمارے رزق میں برکت اور دلوں میں سکون عطا فرما۔ آمین"'
            },
            {
                wish: "صبح کا آغاز اللہ کے بابرکت نام سے جو بڑا مہربان اور نہایت رحم کرنے والا ہے۔ آپ کا ہر لمحہ مسکراہٹوں سے روشن رہے۔",
                dua: '"اے رب! ہمارے تمام دکھوں کو سکھ میں بدل دے۔ آمین"'
            },
            {
                wish: "ایک خوبصورت صبح آپ کی منتظر ہے! اللہ پاک آپ کو اور آپ کے گھر والوں کو ہمیشہ اپنی حفظ و امان میں رکھے۔",
                dua: '"یا اللہ! ہمیں نیک اور سیدھے راستے پر چلا۔ آمین"'
            },
            {
                wish: "صبح کی ٹھنڈی ہوا آپ کے دل کو اطمینان اور روح کو تازگی بخشے۔ صبح بخیر!",
                dua: '"اے اللہ! ہمارے گناہوں کو معاف فرما اور حلال روزی عطا کر۔ آمین"'
            }
        ];

        let wishIndex = 0;

        function nextWish() {
            wishIndex = (wishIndex + 1) % wishes.length;
            document.getElementById('wishText').innerText = wishes[wishIndex].wish;
            document.getElementById('duaText').innerText = wishes[wishIndex].dua;

            for (let i = 0; i < 5; i++) {
                const f = new Flower();
                f.y = 0;
                flowers.push(f);
                if (flowers.length > 70) flowers.shift();
            }
        }
    </script>
</body>
</html>
